accidents:
  raw_dir: "data/raw/MOT_accident_data"
  clean_gpkg: "data/processed/accident_bangkok/accidents_clean.gpkg"
  clean_parquet: "data/processed/accident_bangkok/accidents_clean.parquet"
  projected_crs: "EPSG:32647"
  valid_weather:
    - "แจ่มใส"
    - "ฝนตก"
    - "มีหมอก/ควัน/ฝุ่น"
    - "มืดครึ้ม"
    - "อื่นๆ"
    - "ภัยธรรมชาติ เช่น พายุ น้ำท่วม"

road_segments:
  input: "data/raw/osm/osm_roads.gpkg"
  output: "data/processed/road_segments.gpkg"
  intersections_output: "data/processed/intersections.gpkg"
  snapped_accidents_output: "data/processed/accidents_snapped.gpkg"
  snap_max_distance_m: 50
  segment_length_m: 100
  projected_crs: "EPSG:32647"
  drivable_highway_types:
    - motorway
    - motorway_link
    - trunk
    - trunk_link
    - primary
    - primary_link
    - secondary
    - secondary_link
    - tertiary
    - tertiary_link
    - unclassified
    - residential

boundary:
  bangkok: "data/raw/osm/bangkok_boundary.gpkg"

features:
  output_dir: "data/processed/features"
  buffer_m: 200
  poi_types:
    amenity: [school, hospital, university, fuel]
    shop: [mall, supermarket]
  probe_speed_low_kmh: 20
  monsoon_months: [5, 6, 7, 8, 9, 10]

osm:
  place: "Bangkok, Thailand"
  layers:
    - name: roads
      output_path: "data/raw/osm/osm_roads.gpkg"
      tags:
        highway: true

    - name: buildings
      output_path: "data/raw/osm/osm_buildings.gpkg"
      tags:
        building: true

    - name: landuse
      output_path: "data/raw/osm/osm_landuse.gpkg"
      tags:
        landuse: true

    - name: poi
      output_path: "data/raw/osm/osm_poi.gpkg"
      tags:
        amenity: [school, university, hospital, bar, restaurant, fuel, nightclub]
        shop: [mall, supermarket, convenience]

# See configs/data_inventory.yaml for the list of annual accident resources
