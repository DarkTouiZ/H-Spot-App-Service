# H-Spot Bangkok: Model & Preprocessing Parameters
# --------------------------------------------------

preprocessing:
  # Bins to drop due to data sparsity (EDA result)
  sparse_bins_to_drop: ["night", "late_night"]
  
  # Default distance to POI if none found (meters)
  default_poi_dist_m: 5000
  
  # Weights used for calculating the aggregate congestion_score
  congestion_weights:
    morning_peak: 0.35
    daytime: 0.20
    evening_peak: 0.35
    night: 0.10

modeling:
  # Experiment Tracking
  experiment_name: "Bangkok_Accident_Risk"
  
  # Model Selection
  model_type: "xgboost" # Options: xgboost, random_forest
  
  # Hyperparameters
  hyperparameters:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 6
    random_state: 42
    
  target: "is_risky"

  # ----------------------------------------------------------
  # Version 1: Full Features (including accident history)
  # Best accuracy but requires historical accident data
  # ----------------------------------------------------------
  features:
    # Road Geometry
    - highway_rank
    - lanes
    - length_m
    - lanes_known
    
    # Traffic Behavior (Probe)
    - probe_count
    - log_probe_count
    - speed_mean
    - has_probe_data
    - congestion_score       # Replaces redundant pct_below_20kmh_* (r>0.93)
    - speed_drop_morning
    
    # Spatial Context (Surroundings)
    - dist_intersection_m
    - poi_count_200m
    - log_poi_count_200m
    - building_density_200m
    - log_building_density_200m
    - dist_school_m
    - dist_hospital_m
    - dist_fuel_m
    - dist_mall_m
    
    # Historical Context (highly predictive — use log version for skew)
    - log_acc_monsoon
    - log_acc_morning_peak
    - log_acc_evening_peak
    - log_acc_rate_per_100m
    - log_acc_total

  # ----------------------------------------------------------
  # Version 2: No Historical Accidents
  # Useful for new roads / planning where no history exists
  # ----------------------------------------------------------
  features_v2:
    - highway_rank
    - lanes
    - length_m
    - lanes_known
    - probe_count
    - log_probe_count
    - speed_mean
    - has_probe_data
    - congestion_score
    - speed_drop_morning
    - log_dist_intersection_m
    - log_poi_count_200m
    - log_building_density_200m
    - log_dist_school_m
    - log_dist_hospital_m
    - log_dist_fuel_m
    - log_dist_mall_m

explanation:
  # Enable/Disable natural language narrative generation
  enable_narrative: true
  
  # LLM Model to use
  llm_model: "gemini-1.5-flash"
  
  # Number of top SHAP features to feed to the LLM
  top_k_features: 5



